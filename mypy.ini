[mypy]
python_version = 3.11
ignore_missing_imports = True
disallow_untyped_defs = False
disallow_incomplete_defs = False
check_untyped_defs = False
disallow_untyped_calls = False
warn_return_any = False
warn_unused_configs = False
no_implicit_reexport = False
strict_optional = False
follow_imports = skip

# Per-module overrides for generated / third-party code
[mypy-tensorflow.*]
ignore_errors = True

[mypy-keras.*]
ignore_errors = True

[mypy-xgboost.*]
ignore_errors = True

[mypy-shap.*]
ignore_errors = True

[mypy-sklearn.*]
ignore_errors = True

[mypy-scipy.*]
ignore_errors = True

[mypy-kafka.*]
ignore_errors = True

[mypy-mlflow.*]
ignore_errors = True

[mypy-hydra.*]
ignore_errors = True

[mypy-omegaconf.*]
ignore_errors = True
