# ==============================================================================
# ATTACK SWEEP CONFIGURATION
# ==============================================================================
# Parameter grids for adversarial robustness evaluation.
# Used by simulation_engine.py and experiments/benchmark_suite.py
# ==============================================================================

# ── Evasion Attacks ──────────────────────────────────────────
evasion:
  pgd:
    epsilon: [0.0, 0.01, 0.05, 0.10, 0.20, 0.30]
    steps: [10, 20, 40]
    norm: [l2, linf]
  carlini_wagner:
    confidence: [0, 5, 10]
    max_iter: [100, 500]
    learning_rate: [0.01]
  auto_attack:
    epsilon: [0.05, 0.10, 0.20]
    norm: [l2, linf]

# ── Physical Constraint Attacks ──────────────────────────────
physical:
  feature_constrained:
    epsilon: [0.01, 0.05, 0.10]
    mutable_features: [iat, packet_length, duration, bytes_sent]
  slow_drip:
    factor: [0.5, 0.3, 0.1]
  mimicry:
    n_clusters: [5, 10]

# ── Black-Box Attacks ────────────────────────────────────────
black_box:
  boundary:
    max_queries: [1000, 5000]
  hopskipjump:
    max_queries: [1000, 5000]
  transfer:
    surrogate_models: [random_forest, mlp, logistic_regression]

# ── Poisoning Attacks ────────────────────────────────────────
poisoning:
  label_flip:
    fraction: [0.0, 0.01, 0.03, 0.05, 0.10]
  backdoor:
    fraction: [0.01, 0.03]
    trigger_size: [1, 3]
  clean_label:
    fraction: [0.01, 0.05]
  calibration:
    fraction: [0.05, 0.10, 0.20]

# ── Simulation Parameters ────────────────────────────────────
simulation:
  subsample: 200000
  batch_size: 10000
  alert_decay: 0.4
  retrain_window: 50000
