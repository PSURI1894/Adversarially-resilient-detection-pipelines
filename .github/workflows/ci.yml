# ==============================================================================
# CI/CD PIPELINE — ADVERSARIALLY RESILIENT IDS
# ==============================================================================
# Triggers: push to main, pull requests
# Jobs: lint, test, security scan, robustness regression
# ==============================================================================

name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  # ── Lint & Type Check ────────────────────────────────────────
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install linters
        run: pip install ruff mypy

      - name: Run ruff (linter)
        run: ruff check src/ tests/ --output-format=github

      - name: Run ruff (formatter check)
        run: ruff format --check src/ tests/

      - name: Run mypy (type check)
        run: mypy src/ --ignore-missing-imports --no-error-summary
        continue-on-error: true  # Advisory until full type coverage

  # ── Unit Tests ───────────────────────────────────────────────
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-timeout

      - name: Run tests with coverage
        run: |
          pytest tests/ \
            --cov=src \
            --cov-report=xml \
            --cov-report=term-missing \
            --timeout=300 \
            -v

      - name: Check coverage threshold
        run: |
          coverage_pct=$(python -c "
          import xml.etree.ElementTree as ET
          tree = ET.parse('coverage.xml')
          rate = float(tree.getroot().attrib['line-rate'])
          print(int(rate * 100))
          ")
          echo "Coverage: ${coverage_pct}%"
          if [ "$coverage_pct" -lt 85 ]; then
            echo "::warning::Coverage ${coverage_pct}% is below 85% target"
          fi

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  # ── Security Scan ────────────────────────────────────────────
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install bandit
        run: pip install bandit

      - name: Run bandit security scan
        run: |
          bandit -r src/ \
            -f json \
            -o bandit-report.json \
            --severity-level medium \
            || true

      - name: Parse bandit results
        run: |
          python -c "
          import json
          with open('bandit-report.json') as f:
              report = json.load(f)
          issues = report.get('results', [])
          high = [i for i in issues if i['issue_severity'] == 'HIGH']
          if high:
              print('::error::Found HIGH severity security issues:')
              for i in high:
                  print(f\"  {i['filename']}:{i['line_number']} - {i['issue_text']}\")
              exit(1)
          print(f'Security scan passed ({len(issues)} advisory issues)')
          "

      - name: Upload security report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-report
          path: bandit-report.json

  # ── Integration Test ─────────────────────────────────────────
  integration:
    name: Integration Test
    runs-on: ubuntu-latest
    needs: [test, security]
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Run integration tests
        run: |
          pytest tests/test_integration.py -v --timeout=600 || true
        continue-on-error: true  # Integration tests may need full infra

  # ── Docker Build ─────────────────────────────────────────────
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t ids-pipeline:ci-${{ github.sha }} .

      - name: Verify container starts
        run: |
          docker run --rm -d --name ids-test ids-pipeline:ci-${{ github.sha }} sleep 30
          docker exec ids-test python -c "from src.mlops import ExperimentTracker; print('Import OK')"
          docker stop ids-test
