# ==============================================================================
# nginx — ARDP Reverse Proxy Configuration
# ==============================================================================
# Handles:
#   - HTTP → HTTPS redirect
#   - REST API proxy to FastAPI (port 8000)
#   - WebSocket upgrade for /ws/live
#   - Static file serving fallback
# ==============================================================================

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /run/nginx.pid;

events {
    worker_connections 512;      # conservative for t2.micro
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';
    access_log /var/log/nginx/access.log main;

    sendfile        on;
    keepalive_timeout 65;
    gzip on;
    gzip_types text/plain application/json application/javascript text/css;

    # ── Rate limiting ───────────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;

    # ── Upstream: FastAPI ───────────────────────────────────────
    upstream ardp_api {
        server 127.0.0.1:8000;
        keepalive 16;
    }

    # ── HTTP → HTTPS redirect ───────────────────────────────────
    server {
        listen 80;
        server_name _;

        # Let's Encrypt ACME challenge
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── HTTPS server ────────────────────────────────────────────
    server {
        listen 443 ssl http2;
        server_name _;

        # TLS certificates (populate via certbot)
        ssl_certificate     /etc/letsencrypt/live/ardp/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/ardp/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;

        # Security headers
        add_header X-Frame-Options           DENY;
        add_header X-Content-Type-Options    nosniff;
        add_header X-XSS-Protection          "1; mode=block";
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        # ── REST API ──────────────────────────────────────────
        location /api/ {
            limit_req zone=api burst=20 nodelay;
            proxy_pass         http://ardp_api/api/;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
        }

        # ── WebSocket (real-time alert stream) ────────────────
        location /ws/ {
            proxy_pass         http://ardp_api/ws/;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host       $host;
            proxy_read_timeout 3600s;    # keep WS alive for 1 hour
            proxy_send_timeout 3600s;
        }

        # ── Health check (no rate limit, no auth) ────────────
        location = /health {
            proxy_pass http://ardp_api/api/status;
            access_log off;
        }

        # ── Docs (Swagger UI) ─────────────────────────────────
        location /docs {
            proxy_pass http://ardp_api/docs;
            proxy_set_header Host $host;
        }

        location /openapi.json {
            proxy_pass http://ardp_api/openapi.json;
        }

        # ── Fallback 404 ──────────────────────────────────────
        error_page 404 /404.html;
        location = /404.html {
            root /usr/share/nginx/html;
            internal;
        }
    }

    # ── HTTP-only (no TLS) — for initial setup before certbot ──
    # Uncomment this block and comment the HTTPS server above
    # until TLS certificates are issued.
    #
    # server {
    #     listen 80;
    #     server_name _;
    #
    #     location /api/ {
    #         proxy_pass http://ardp_api/api/;
    #         proxy_http_version 1.1;
    #         proxy_set_header Host $host;
    #     }
    #
    #     location /ws/ {
    #         proxy_pass http://ardp_api/ws/;
    #         proxy_http_version 1.1;
    #         proxy_set_header Upgrade $http_upgrade;
    #         proxy_set_header Connection "upgrade";
    #         proxy_read_timeout 3600s;
    #     }
    #
    #     location = /health {
    #         proxy_pass http://ardp_api/api/status;
    #         access_log off;
    #     }
    # }
}
