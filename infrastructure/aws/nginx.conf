# ==============================================================================
# nginx — ARDP Reverse Proxy Configuration
# ==============================================================================
# Handles:
#   - HTTP → HTTPS redirect
#   - REST API proxy to FastAPI (port 8000)
#   - WebSocket upgrade for /ws/live
#   - Static file serving fallback
# ==============================================================================

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /run/nginx.pid;

events {
    worker_connections 512;      # conservative for t2.micro
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';
    access_log /var/log/nginx/access.log main;

    sendfile        on;
    keepalive_timeout 65;
    gzip on;
    gzip_types text/plain application/json application/javascript text/css;

    # ── Rate limiting ───────────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;

    # ── Upstream: FastAPI ───────────────────────────────────────
    upstream ardp_api {
        server api:8000;
        keepalive 16;
    }

    # ── HTTP-only (no TLS — raw IP deployment) ─────────────────
    server {
        listen 80;
        server_name _;

        location /api/ {
            limit_req zone=api burst=20 nodelay;
            proxy_pass         http://ardp_api/api/;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_read_timeout 60s;
        }

        location /ws/ {
            proxy_pass         http://ardp_api/ws/;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host       $host;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        location = /health {
            proxy_pass http://ardp_api/api/status;
            access_log off;
        }

        location /docs {
            proxy_pass http://ardp_api/docs;
            proxy_set_header Host $host;
        }

        location /openapi.json {
            proxy_pass http://ardp_api/openapi.json;
        }

        location / {
            root /usr/share/nginx/html;
            index index.html;
            try_files $uri $uri/ /index.html;  # SPA fallback
        }
    }
}
